<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Space Naim</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 40px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Top buttons */
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .top-btn {
      width: 48px;
      height: 48px;
      background: #2a2a2a;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
    }

    .top-btn svg {
      width: 20px;
      height: 20px;
    }

    /* Avatar */
    .avatar-wrap {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 16px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-placeholder {
      font-size: 36px;
    }

    /* Name & bio */
    .name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      text-align: center;
    }

    .bio {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 28px;
      text-align: center;
    }

    /* Social icons row */
    .social-icons {
      display: flex;
      gap: 24px;
      margin-bottom: 36px;
    }

    .social-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0.9;
      transition: opacity 0.2s;
    }

    .social-icon:hover {
      opacity: 1;
    }

    .social-icon svg {
      width: 32px;
      height: 32px;
      fill: #fff;
    }

    /* Banner */

    .banner-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: #ffffff;
      border-radius: 16px;
      display: block;
    }

    .banner-wrap {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .banner-img {
      width: 100%;
      display: block;
      object-fit: cover;
      border-radius: 16px;
    }

    /* Social Cards */
    .cards {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 40px;
    }

    .social-card {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 0 20px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      position: relative;
      transition: filter 0.2s, transform 0.15s;
      text-decoration: none;
    }

    .social-card:hover {
      filter: brightness(1.1);
      transform: scale(1.01);
    }

    .social-card:active {
      transform: scale(0.99);
    }

    /* Instagram gradient */
    .card-instagram {
      background: linear-gradient(to right, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }

    /* TikTok */
    .card-tiktok {
      background: #000;
      border: 1.5px solid #333;
    }

    /* WhatsApp */
    .card-whatsapp {
      background: #25D366;
    }

    .card-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .card-circle {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      flex-shrink: 0;
    }

    .card-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-icon svg {
      width: 28px;
      height: 28px;
      fill: #fff;
    }

    .card-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .card-dots {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 4px;
    }

    .card-dots span {
      display: block;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      transition: background 0.2s;
    }

    .card-dots:hover span {
      background: rgba(255,255,255,1);
    }

    .card-dots:active span {
      background: rgba(255,255,255,0.7);
      transform: scale(1.3);
    }

    /* CTA button */
    .cta-btn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 999px;
      padding: 18px 36px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 85%;
      max-width: 340px;
      margin-bottom: 36px;
      transition: opacity 0.2s;
    }

    .cta-btn:hover {
      opacity: 0.9;
    }

    /* Footer links */
    .footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 16px;
      font-size: 12px;
      color: #666;
    }

    .footer-links a {
      color: #666;
      text-decoration: none;
    }

    .footer-links a:hover {
      color: #999;
    }
  
    /* ===== SHARE MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-sheet {
      background: #fff;
      width: 100%;
      max-width: 480px;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 36px;
      animation: slideUp 0.28s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: #000;
    }

    .modal-close {
      position: absolute;
      right: 0;
      background: none;
      border: none;
      font-size: 18px;
      color: #555;
      cursor: pointer;
      padding: 4px 8px;
    }

    .modal-preview {
      background: #2a2a2a;
      border-radius: 14px;
      padding: 16px;
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 20px;
    }

    .preview-thumb {
      width: 72px;
      height: 72px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: #444;
    }

    .preview-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-info {
      flex: 1;
      overflow: hidden;
    }

    .preview-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 5px;
    }

    .preview-url {
      font-size: 12px;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .modal-divider {
      border: none;
      border-top: 1px solid #e5e5e5;
      margin-bottom: 20px;
    }

    .share-options {
      display: flex;
      gap: 8px;
      justify-content: space-around;
    }

    .share-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      flex: 1;
    }

    .share-item span {
      font-size: 11px;
      color: #333;
      font-weight: 500;
    }

    .share-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .share-icon svg {
      width: 26px;
      height: 26px;
    }

    .share-copy { background: #e8e8e8; }
    .share-x    { background: #000; }
    .share-fb   { background: #1877F2; }
    .share-wts  { background: #25D366; }

  </style>

  <script>
    var currentShareUrl = '';

    function openLink(url) {
      window.open(url, '_blank');
    }

    function openShare(name, url) {
      currentShareUrl = url;
      document.getElementById('previewTitle').textContent = name;
      document.getElementById('previewUrl').textContent = url;
      // show modal
      document.getElementById('shareModal').classList.add('active');
    }

    function closeShare() {
      document.getElementById('shareModal').classList.remove('active');
    }

    function copyShareLink() {
      navigator.clipboard.writeText(currentShareUrl).then(() => {
        alert('Lien copié !');
      }).catch(() => {
        alert(currentShareUrl);
      });
      closeShare();
    }

    function shareVia(base) {
      window.open(base + encodeURIComponent(currentShareUrl), '_blank');
      closeShare();
    }

    function shareProfile() {
      if (navigator.share) {
        navigator.share({ title: 'Space Naim', url: window.location.href });
      } else {
        navigator.clipboard.writeText(window.location.href);
      }
    }
  </script>

    <div class="modal-sheet" onclick="event.stopPropagation()">
